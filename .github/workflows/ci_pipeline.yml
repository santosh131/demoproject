name: Ci Pileline

on: workflow_dispatch #triggers workflow manually

#on:
#    push: 
#       branches: [main]

jobs:
    build: 
        runs-on: [windows-latest]
        steps:
        - name: Checkout repository
          uses: actions/checkout@v6
          with: 
            fetch-depth: 0

        - name: Setup .net core environment
          uses: actions/setup-dotnet@v4
          with:
            dotnet-version: '8.x'

        - name: Restore .net project
          run: dotnet restore
        
        - name: Build .net core project
          run: dotnet build --no-restore --configuration Release

        - name: Test .net core project
          run: dotnet test --no-build --configuration Release

        - name: Publish .net core project
          run: dotnet publish -p:DebugSymbols=false -p:DegubType=None -c Release

        - name: Completed status
          run: |
            echo 'Completed publishing the .net core project'
        


